 "The `posts_tag_wiki_excerpt` table in the BigQuery Stack Overflow public dataset contains summary information, or excerpts, from the wiki pages associated with various tags. Each row represents a single tag wiki excerpt, providing details such as the excerpt's body, its associated tag, and metadata about its creation and last modification. This table is useful for understanding the brief descriptions provided for tags on the Stack Overflow platform, offering quick insights into what a particular tag represents.\n\n# Schema\n- `id`: Unique identifier for the tag wiki excerpt.\n- `title`: Title of the tag wiki excerpt.\n- `body`: The content of the tag wiki excerpt.\n- `accepted_answer_id`: (STRING)\n- `answer_count`: (STRING)\n- `comment_count`: Number of comments on the excerpt.\n- `community_owned_date`: When the excerpt became community-owned.\n- `creation_date`: When the excerpt was created.\n- `favorite_count`: (STRING)\n- `last_activity_date`: Last activity date on the excerpt.\n- `last_edit_date`: Last edit date of the excerpt.\n- `last_editor_display_name`: Display name of the last editor.\n- `last_editor_user_id`: User ID of the last editor.\n- `owner_display_name`: Display name of the owner.\n- `owner_user_id`: User ID of the owner.\n- `parent_id`: (STRING)\n- `post_type_id`: Type of post.\n- `score`: Score of the excerpt.\n- `tags`: The tag associated with this wiki excerpt (e.g., `<python>`).\n- `view_count`: (STRING)\n\n# Common query patterns\n\n```sql\nSELECT\n    title,\n    body\n  FROM\n    `bigquery-public-data.stackoverflow.posts_tag_wiki_excerpt`\n  WHERE\n    id = 12345\n```\n\n```sql\nSELECT\n    title,\n    tags\n  FROM\n    `bigquery-public-data.stackoverflow.posts_tag_wiki_excerpt`\n  WHERE\n    body LIKE '%python%'\n```\n\n```sql\nSELECT\n    title,\n    creation_date,\n    last_editor_display_name\n  FROM\n    `bigquery-public-data.stackoverflow.posts_tag_wiki_excerpt`\n  ORDER BY\n    creation_date DESC\n  LIMIT 10\n```\n\n# Citations\n[1] [BigQuery Public Data: Stack Overflow posts_tag_wiki_excerpt](https://bigquery.googleapis.com/v2/projects/bigquery-public-data/datasets/stackoverflow/tables/posts_tag_wiki_excerpt)", "tables/posts_wiki_placeholder": "This table serves as a placeholder for various wiki posts within the Stack Overflow community, containing community-maintained help, guidelines, and other informational content. Each row in this table represents a single wiki post, identified by a unique `id`. These posts often include details about election processes, help center articles, and general community guidelines.\n\n# Schema\n\n- `id`: INTEGER, Unique identifier for the wiki post.\n- `title`: STRING, Title of the wiki post.\n- `body`: STRING, The main content of the wiki post.\n- `accepted_answer_id`: STRING\n- `answer_count`: STRING\n- `comment_count`: INTEGER, Number of comments on the post.\n- `community_owned_date`: STRING\n- `creation_date`: TIMESTAMP, Timestamp when the post was created.\n- `favorite_count`: STRING\n- `last_activity_date`: TIMESTAMP, Timestamp of the last activity on the post.\n- `last_edit_date`: TIMESTAMP, Timestamp when the post was last edited.\n- `last_editor_display_name`: STRING\n- `last_editor_user_id`: INTEGER, User ID of the last editor.\n- `owner_display_name`: STRING\n- `owner_user_id`: INTEGER, User ID of the post owner.\n- `parent_id`: STRING\n- `post_type_id`: INTEGER, Type of the post (e.g., 7 for Wiki).\n- `score`: INTEGER, Score of the post.\n- `tags`: STRING, Tags associated with the post.\n- `view_count`: STRING\n\n# Common query patterns\n\n```sql\nSELECT\n    id, title, body\n  FROM\n    `bigquery-public-data.stackoverflow.posts_wiki_placeholder`\n  WHERE\n    id = 8041931\n```\n\n```sql\nSELECT\n    id, title\n  FROM\n    `bigquery-public-data.stackoverflow.posts_wiki_placeholder`\n  WHERE\n    body LIKE '%election process%'\n  LIMIT 100\n```\n\n```sql\nSELECT\n    EXTRACT(YEAR FROM creation_date) AS creation_year,\n    COUNT(id) AS post_count\n  FROM\n    `bigquery-public-data.stackoverflow.posts_wiki_placeholder`\n  GROUP BY\n    creation_year\n  ORDER BY\n    creation_year DESC\n```\n\n# Citations\n\n[1] [BigQuery Public Data: Stack Overflow posts_wiki_placeholder](https://bigquery.googleapis.com/v2/projects/bigquery-public-data/datasets/stackoverflow/tables/posts_wiki_placeholder)", "tables/stackoverflow_posts": "This table, `stackoverflow_posts`, is a legacy table from the [stackoverflow](/datasets/stackoverflow.md) dataset in Google Cloud's BigQuery public datasets. It contains all posts (questions and answers) from Stack Overflow. **This table is deprecated and should not be used for new queries.** Users are advised to use the more specific and updated tables like [posts_questions](/tables/posts_questions.md) for questions and [posts_answers](/tables/posts_answers.md) for answers. Each row in this table represents a single post, with fields such as `id`, `title`, `body`, `creation_date`, and user information. The table contains approximately 31 million rows and over 31 GB of data.\n\n# Schema\n\n- `id`: Unique identifier for the post.\n- `title`: The title of the post (for questions).\n- `body`: The main content of the post.\n- `accepted_answer_id`: The ID of the accepted answer (for questions).\n- `answer_count`: Number of answers for a question.\n- `comment_count`: Number of comments on the post.\n- `community_owned_date`: Timestamp when the post became community-owned.\n- `creation_date`: Timestamp when the post was created.\n- `favorite_count`: Number of times the post has been favorited.\n- `last_activity_date`: Timestamp of the last activity on the post.\n- `last_edit_date`: Timestamp of the last edit.\n- `last_editor_display_name`: Display name of the last editor.\n- `last_editor_user_id`: User ID of the last editor.\n- `owner_display_name`: Display name of the post owner.\n- `owner_user_id`: User ID of the post owner.\n- `parent_id`: For answers, the ID of the question it answers.\n- `post_type_id`: Type of the post (e.g., 1 for question, 2 for answer).\n- `score`: The score of the post (upvotes - downvotes).\n- `tags`: Comma-separated tags associated with the post (for questions).\n- `view_count`: Number of views for the post (for questions).\n\n# Common query patterns\n\n```sql\nSELECT\n  id,\n  title,\n  creation_date\nFROM\n  `bigquery-public-data.stackoverflow.stackoverflow_posts`\nWHERE\n  creation_date BETWEEN '2008-01-01' AND '2008-01-31'\n  AND post_type_id = 1 -- Questions only\nLIMIT 100;\n```\n\n# Citations\n\n[1] [BigQuery Console - stackoverflow_posts](https://bigquery.googleapis.com/v2/projects/bigquery-public-data/datasets/stackoverflow/tables/stackoverflow_posts)\n[2] [BigQuery Public Datasets - Stack Overflow](https://cloud.google.com/bigquery/public-data/stackoverflow)", "tables/tags": "This table, `tags`, from the [stackoverflow](/datasets/stackoverflow.md) dataset, provides a comprehensive list of all tags used across the Stack Overflow platform. Each row represents a unique tag, detailing its name, the total count of times it has been used, and references to its corresponding excerpt and wiki posts. This table is essential for understanding the topics and technologies discussed on Stack Overflow, allowing for analysis of tag popularity, trends, and content organization.\n\n# Schema\nThe `tags` table contains the following fields:\n- `id` (INTEGER) - Unique identifier for the tag.\n- `tag_name` (STRING) - The name of the tag (e.g., \\'python\\', \\'java\\', \\'javascript\\').\n- `count` (INTEGER) - The total number of times this tag has been used.\n- `excerpt_post_id` (INTEGER) - The ID of the Post that holds the excerpt text of the tag. Nullable.\n- `wiki_post_id` (INTEGER) - The ID of the Post that holds the wiki text of the tag. Nullable.\n- `is_moderator_only` (BOOLEAN) - Indicates if the tag can only be used by moderators.\n- `is_required` (BOOLEAN) - Indicates if the tag is required for certain post types.\n\n# Common query patterns\n\n1. Find the most popular tags:\n```sql\nSELECT\n    tag_name,\n    count\n  FROM\n    `bigquery-public-data.stackoverflow.tags`\n  GROUP BY\n    tag_name\n  ORDER BY\n    count DESC\n  LIMIT 10\n```\n\n2. Get details for a specific tag:\n```sql\nSELECT\n    id,\n    tag_name,\n    count,\n    excerpt_post_id,\n    wiki_post_id\n  FROM\n    `bigquery-public-data.stackoverflow.tags`\n  WHERE\n    tag_name = \\'python\\'\n```\n\n3. Join with posts to find posts related to a popular tag (example uses `posts_questions` which is related to `stackoverflow_posts`):\n```sql\nSELECT\n    p.title,\n    t.tag_name\n  FROM\n    `bigquery-public-data.stackoverflow.posts_questions` AS p,\n    `bigquery-public-data.stackoverflow.tags` AS t\n  WHERE\n    p.tags LIKE CONCAT(\\'%<\\', t.tag_name, \\'>%\\' )\n    AND t.tag_name = \\'javascript\\'\n  LIMIT 5\n```\n\n# Citations\n[1] [BigQuery Public Dataset: Stack Overflow Tags](https://bigquery.googleapis.com/v2/projects/bigquery-public-data/datasets/stackoverflow/tables/tags)\n[2] [Stack Overflow Dataset on BigQuery](https://console.cloud.google.com/marketplace/details/stackoverflow/stackoverflow)\n[3] [Database schema documentation for the public data dump and SEDE](https://meta.stackexchange.com/questions/2677/database-schema-documentation-for-the-public-data-dump-and-sede)", "tables/users": "This table, `users`, from the [stackoverflow](/datasets/stackoverflow.md) dataset, stores profiles of registered users on the Stack Overflow platform. Each row represents a unique user, identified by their `id`. The table includes details such as display name, creation date, last access date, reputation, and vote counts. It provides insights into the activity and characteristics of the Stack Overflow community members.\n\n# Schema\n\n*   `id` (INTEGER) - Unique identifier for the user.\n*   `display_name` (STRING) - The publicly visible name of the user.\n*   `about_me` (STRING) - User-provided free-form text about themselves. Nullable.\n*   `age` (INTEGER) - User-provided age. Nullable.\n*   `account_id` (INTEGER) - User\\'s Stack Exchange Network profile ID; NULL if the user has hidden this community in their profile. Nullable.\n*   `creation_date` (TIMESTAMP) - Timestamp when the user account was created.\n*   `email_hash` (STRING) - Gravatar email hash, now always NULL and will not appear as an attribute in the data dump XML. Nullable.\n*   `last_access_date` (TIMESTAMP) - Datetime user last loaded a page; updated every 30 minutes at most.\n*   `location` (STRING) - User-provided geographical location. Nullable.\n*   `reputation` (INTEGER) - The user\\'s reputation score.\n*   `up_votes` (INTEGER) - How many upvotes the user has cast.\n*   `down_votes` (INTEGER) - Total number of downvotes received by the user.\n*   `views` (INTEGER) - Number of times the user\\'s profile has been viewed.\n*   `profile_image_url` (STRING) - URL of the user\\'s profile picture. Nullable.\n*   `website_url` (STRING) - URL of the user\\'s personal website. Nullable.\n\n# Common query patterns\n\n1.  Find the top 10 users by reputation:\n    ```sql\n    SELECT\n      id,\n      display_name,\n      reputation\n    FROM\n      `bigquery-public-data.stackoverflow.users`\n    ORDER BY\n      reputation DESC\n    LIMIT 10\n    ```\n2.  Count users created per year:\n    ```sql\n    SELECT\n      EXTRACT(YEAR FROM creation_date) AS creation_year,\n      COUNT(id) AS user_count\n    FROM\n      `bigquery-public-data.stackoverflow.users`\n    GROUP BY\n      creation_year\n    ORDER BY\n      creation_year\n    ```\n3.  Find users with a high number of upvotes given:\n    ```sql\n    SELECT\n      display_name,\n      up_votes\n    FROM\n      `bigquery-public-data.stackoverflow.users`\n    WHERE\n      up_votes > 1000\n    ORDER BY\n      up_votes DESC\n    LIMIT 5\n    ```\n\n# Citations\n\n[1] [Stack Overflow Users Table](https://bigquery.googleapis.com/v2/projects/bigquery-public-data/datasets/stackoverflow/tables/users)\n[2] [Database schema documentation for the public data dump and SEDE](https://meta.stackexchange.com/questions/2677/database-schema-documentation-for-the-public-data-dump-and-sede)", "tables/votes": "This table, `votes`, from the [stackoverflow](/datasets/stackoverflow.md) dataset, records individual voting events on various posts (questions, answers, etc.) within the Stack Overflow platform. Each row represents a single vote, providing details such as the unique vote identifier, the timestamp of the vote, the ID of the post that received the vote, and the type of vote (e.g., upvote, downvote, favorite). This table is crucial for analyzing user engagement, post popularity, and the overall quality assessment mechanisms within the Stack Overflow community. The grain of this table is one row per vote event, and it captures historical voting data from its creation date up to the last modification.\n\n# Schema\n\n- `id` (INTEGER) - Unique identifier for the vote.\n- `post_id` (INTEGER) - The ID of the post to which the vote was cast. Links to `posts_questions` or `posts_answers` tables.\n- `vote_type_id` (INTEGER) - The type of vote. See the [Vote Types reference](/references/vote_types.md) for a comprehensive list.\n- `user_id` (INTEGER) - The ID of the user who cast the vote. Present only if `VoteTypeId` is `5` (Favorite/Bookmark) or `8` (BountyStart); -1 if user is deleted. Nullable. Links to the `users` table.\n- `creation_date` (TIMESTAMP) - The date when the vote was cast. Time data is purposefully removed to protect user privacy.\n- `bounty_amount` (INTEGER) - The amount of bounty associated with the vote. Present only if `VoteTypeId` is `8` (BountyStart) or `9` (BountyClose). Nullable.\n\n# Common query patterns\n\n```sql\n-- Get the total number of votes for each vote type\nSELECT\n  vote_type_id,\n  COUNT(id) AS total_votes\nFROM\n  `bigquery-public-data.stackoverflow.votes`\nGROUP BY\n  vote_type_id\nORDER BY\n  total_votes DESC;\n```\n\n```sql\n-- Find the top 10 most voted posts by summing up all votes (assuming all vote_type_ids contribute positively)\nSELECT\n  post_id,\n  COUNT(id) AS total_votes\nFROM\n  `bigquery-public-data.stackoverflow.votes`\nGROUP BY\n  post_id\nORDER BY\n  total_votes DESC\nLIMIT 10;\n```\n\n```sql\n-- Count votes over time\nSELECT\n  DATE(creation_date) AS vote_date,\n  COUNT(id) AS daily_votes\nFROM\n  `bigquery-public-data.stackoverflow.votes`\nWHERE\n  creation_date >= \\'2020-01-01\\' AND creation_date < \\'2021-01-01\\'\nGROUP BY\n  vote_date\nORDER BY\n  vote_date;\n```\n\n# Citations\n[1] [BigQuery Public Dataset: Stack Overflow Votes Table](https://bigquery.googleapis.com/v2/projects/bigquery-public-data/datasets/stackoverflow/tables/votes)\n[2] [Database schema documentation for the public data dump and SEDE](https://meta.stackexchange.com/questions/2677/database-schema-documentation-for-the-public-data-dump-and-sede)"}, "types": ["BigQuery Dataset", "BigQuery Table", "Reference"], "palette": {"BigQuery Dataset": "#8b5cf6", "BigQuery Table": "#3b82f6", "Reference": "#10b981"}};
</script>
<script>

  document.title = `${bundleName} — OKF Viewer`;
  document.getElementById("bundle-name").textContent = bundleName;

  // Build reverse-link index for backlinks
  const backlinks = {};
  for (const edge of bundle.edges) {

  }

  // Look up node label/type by id
  const nodeIndex = {};
  for (const n of bundle.nodes) nodeIndex[n.data.id] = n.data;

  const cy = cytoscape({
    container: document.getElementById("graph"),
    elements: [...bundle.nodes, ...bundle.edges],
    style: [
      {
        selector: "node",
        style: {
          "background-color": "data(color)",
          "label": "data(label)",

          "width": "data(size)",
          "height": "data(size)",
          "border-width": 1,
          "border-color": "#0f172a",
        },
      },
      {
        selector: "node:selected",
        style: {
          "border-width": 3,
          "border-color": "#f59e0b",
        },
      },
      {
        selector: "edge",
        style: {
          "width": 1.5,
          "line-color": "#cbd5e1",
          "target-arrow-color": "#cbd5e1",
          "target-arrow-shape": "triangle",
          "curve-style": "bezier",
          "arrow-scale": 0.9,
        },
      },
      {
        selector: "edge:selected",

          "target-arrow-color": "#f59e0b",
          "width": 2.5,
        },
      },
      {
        selector: ".dim",
        style: { "opacity": 0.15 },
      },
    ],
    layout: { name: "cose", animate: false, padding: 30 },
    wheelSensitivity: 0.2,
  });

  cy.on("tap", "node", (evt) => showDetail(evt.target.id()));
  cy.on("tap", (evt) => {
    if (evt.target === cy) clearSelection();
  });

  document.getElementById("layout").addEventListener("change", (e) => {
    cy.layout({ name: e.target.value, animate: false, padding: 30 }).run();
  });

  document.getElementById("reset").addEventListener("click", () => {
    cy.fit(null, 30);
    clearSelection();
  });

  document.getElementById("search").addEventListener("input", (e) => {
    const q = e.target.value.trim().toLowerCase();
    if (!q) {
      cy.elements().removeClass("dim");
      return;
    }
    cy.nodes().forEach((n) => {
      const d = n.data();
      const hay =
        (d.label || "").toLowerCase() + " " +
        d.id.toLowerCase() + " " +
        (d.tags || []).join(" ").toLowerCase();
      n.toggleClass("dim", !hay.includes(q));
    });
    cy.edges().forEach((edge) => {
      const src = edge.source();
      const tgt = edge.target();
      edge.toggleClass("dim", src.hasClass("dim") || tgt.hasClass("dim"));
    });
  });

  document.getElementById("filter-type").addEventListener("change", (e) => {
    const t = e.target.value;
    if (!t) {
      cy.elements().removeClass("dim");
      return;
    }
    cy.nodes().forEach((n) => {
      n.toggleClass("dim", n.data("type") !== t);
    });
    cy.edges().forEach((edge) => {
      edge.toggleClass("dim", edge.source().hasClass("dim") || edge.target().hasClass("dim"));
    });
  });

  function clearSelection() {
    cy.elements().unselect();
    document.getElementById("detail-empty").hidden = false;
    document.getElementById("detail-content").hidden = true;
  }

  function showDetail(conceptId) {
    const data = nodeIndex[conceptId];
    if (!data) return;
    cy.elements().unselect();
    const node = cy.getElementById(conceptId);
    if (node) node.select();

    document.getElementById("detail-empty").hidden = true;
    const content = document.getElementById("detail-content");
    content.hidden = false;

    const chip = document.getElementById("detail-type");
    chip.textContent = data.type;
    chip.style.background = data.color;

    document.getElementById("detail-title").textContent = data.label;
    document.getElementById("detail-id").textContent = conceptId;
    document.getElementById("detail-description").textContent = data.description || "—";

    const resourceEl = document.getElementById("detail-resource");
    resourceEl.innerHTML = "";
    if (data.resource) {
      const a = document.createElement("a");
      a.href = data.resource;
      a.textContent = data.resource;
      a.target = "_blank";
      a.rel = "noopener";
      a.className = "external";
      resourceEl.appendChild(a);
    } else {
      resourceEl.textContent = "—";
    }

    const tagsEl = document.getElementById("detail-tags");
    tagsEl.innerHTML = "";
    if (data.tags && data.tags.length) {
      for (const t of data.tags) {
        const span = document.createElement("span");
        span.className = "tag";
        span.textContent = t;
        tagsEl.appendChild(span);
      }
    } else {
      tagsEl.textContent = "—";
    }

    const body = bundle.bodies[conceptId] || "";
    const html = marked.parse(body, { breaks: false, gfm: true });
    const bodyEl = document.getElementById("detail-body");
    bodyEl.innerHTML = html;
    rewriteInternalLinks(bodyEl);

    const bl = backlinks[conceptId] || [];
    const blSection = document.getElementById("detail-backlinks");
    const blList = document.getElementById("backlinks-list");
    blList.innerHTML = "";
    if (bl.length) {
      blSection.hidden = false;
      for (const src of bl) {
        const li = document.createElement("li");
        const a = document.createElement("a");
        a.textContent = nodeIndex[src]?.label || src;
        a.dataset.target = src;
        a.addEventListener("click", () => showDetail(src));
        li.appendChild(a);
        const muted = document.createElement("span");
        muted.className = "muted";
        muted.textContent = ` (${src})`;
        li.appendChild(muted);
        blList.appendChild(li);
      }
    } else {
      blSection.hidden = true;
    }

    cy.animate({ center: { eles: node }, zoom: Math.max(cy.zoom(), 1.0) }, { duration: 200 });
  }

  function rewriteInternalLinks(root) {
    root.querySelectorAll("a[href]").forEach((a) => {
      const href = a.getAttribute("href");
      if (!href) return;
      if (href.startsWith("/") && href.endsWith(".md")) {
        const target = href.slice(1, -3);
        if (nodeIndex[target]) {
          a.className = "internal";
          a.setAttribute("href", "javascript:void(0)");
          a.addEventListener("click", (e) => {
            e.preventDefault();
            showDetail(target);
          });
          return;
        }
      }
      a.className = "external";
      a.setAttribute("target", "_blank");
      a.setAttribute("rel", "noopener");
    });
  }

  // Auto-show the first node (a dataset if available, else first concept)
  const initial =
    bundle.nodes.find((n) => n.data.type === "BigQuery Dataset") ||
    bundle.nodes[0];
  if (initial) showDetail(initial.data.id);
})();

</script>
</body>
</html>
