<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>OKF Bundle Viewer</title>
<script src="https://cdn.jsdelivr.net/npm/cytoscape@3.28.1/dist/cytoscape.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
<style>
* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  font-size: 14px;
  color: #0f172a;
  background: #f8fafc;
  display: flex;
  flex-direction: column;
  height: 100vh;
}
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 16px;
  background: #fff;
  border-bottom: 1px solid #e2e8f0;
  flex-shrink: 0;
}
.title strong { font-size: 16px; margin-right: 8px; }
.muted { color: #64748b; font-size: 12px; }
.controls { display: flex; gap: 8px; }
.controls input, .controls select, .controls button {
  font-size: 13px;
  padding: 5px 8px;
  border: 1px solid #cbd5e1;
  border-radius: 4px;
  background: #fff;
}
.controls input { width: 220px; }
.controls button { cursor: pointer; background: #f1f5f9; }
.controls button:hover { background: #e2e8f0; }

main {
  display: flex;
  flex: 1;
  min-height: 0;
}
#graph {
  flex: 1 1 60%;
  background: #fff;
  border-right: 1px solid #e2e8f0;
  min-width: 0;
  position: relative;
}
#detail {
  flex: 0 0 40%;
  overflow-y: auto;
  padding: 18px 22px;
  background: #fff;
}
#detail-empty {
  text-align: center;
  margin-top: 40px;
}

.detail-header { margin-bottom: 12px; }
.detail-header h1 {
  font-size: 18px;
  margin: 4px 0 2px;
  font-weight: 600;
}
.type-chip {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 10px;
  font-size: 11px;
  font-weight: 600;
  color: #fff;
  background: #94a3b8;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
dl.frontmatter {
  display: grid;
  grid-template-columns: 90px 1fr;
  row-gap: 4px;
  column-gap: 12px;
  margin: 8px 0 12px;
  font-size: 13px;
}
dl.frontmatter dt {
  color: #64748b;
  font-weight: 500;
}
dl.frontmatter dd { margin: 0; }
dl.frontmatter a { color: #2563eb; word-break: break-all; }

.tag {
  display: inline-block;
  padding: 1px 6px;
  margin: 0 4px 2px 0;
  border-radius: 4px;
  background: #f1f5f9;
  color: #475569;
  font-size: 11px;
}

hr { border: none; border-top: 1px solid #e2e8f0; margin: 14px 0; }

#detail-body { font-size: 13px; line-height: 1.55; }
#detail-body h1 {
  font-size: 16px; margin: 18px 0 6px;
  padding-bottom: 4px; border-bottom: 1px solid #e2e8f0;
}
#detail-body h2 { font-size: 14px; margin: 14px 0 4px; }
#detail-body h3 { font-size: 13px; margin: 12px 0 4px; }
#detail-body p { margin: 6px 0; }
#detail-body code {
  background: #f1f5f9;
  padding: 1px 4px;
  border-radius: 3px;
  font-size: 12px;
  font-family: ui-monospace, "SF Mono", Consolas, monospace;
}
#detail-body pre {
  background: #0f172a;
  color: #e2e8f0;
  padding: 10px 12px;
  border-radius: 6px;
  overflow-x: auto;
  font-size: 12px;
}
#detail-body pre code { background: transparent; color: inherit; padding: 0; }
#detail-body ul, #detail-body ol { padding-left: 22px; margin: 6px 0; }
#detail-body li { margin: 2px 0; }
#detail-body table { border-collapse: collapse; margin: 8px 0; }
#detail-body th, #detail-body td {
  border: 1px solid #e2e8f0; padding: 4px 8px; font-size: 12px;
}
#detail-body a.internal { color: #2563eb; cursor: pointer; }
#detail-body a.external { color: #2563eb; }

#detail-backlinks { margin-top: 18px; }
#detail-backlinks h2 { font-size: 13px; color: #64748b; margin-bottom: 6px; }
#detail-backlinks ul { padding-left: 18px; }
#detail-backlinks a { color: #2563eb; cursor: pointer; }

</style>
</head>
<body>
<header>
  <div class="title">
    <strong id="bundle-name"></strong>
    <span class="muted">OKF bundle</span>
  </div>
  <div class="controls">
    <input id="search" type="search" placeholder="Search title / id / tag">
    <select id="filter-type">
      <option value="">All types</option>
    </select>
    <select id="layout">
      <option value="cose">cose (force)</option>
      <option value="concentric">concentric</option>
      <option value="breadthfirst">breadth-first</option>
      <option value="circle">circle</option>
      <option value="grid">grid</option>
    </select>
    <button id="reset">Reset view</button>
  </div>
</header>

<main>
  <section id="graph"></section>
  <section id="detail">
    <div id="detail-empty" class="muted">Click a node to see its details.</div>
    <article id="detail-content" hidden>
      <header class="detail-header">
        <span class="type-chip" id="detail-type"></span>
        <h1 id="detail-title"></h1>
        <div class="muted" id="detail-id"></div>
      </header>
      <dl class="frontmatter">
        <dt>Description</dt><dd id="detail-description"></dd>
        <dt>Resource</dt><dd id="detail-resource"></dd>
        <dt>Tags</dt><dd id="detail-tags"></dd>
      </dl>
      <hr>
      <div id="detail-body"></div>
      <section id="detail-backlinks" hidden>
        <h2>Cited by</h2>
        <ul id="backlinks-list"></ul>
      </section>
    </article>
  </section>
</main>

"BigQuery Table", "description": "A table containing information about tags used on Stack Overflow, including tag names, counts, and references to their excerpt and wiki posts, along with moderation settings.", "resource": "https://bigquery.googleapis.com/v2/projects/bigquery-public-data/datasets/stackoverflow/tables/tags", "tags": ["stackoverflow", "tags", "community", "metadata", "schema", "data dump"], "color": "#3b82f6", "size": 42}}, {"data": {"id": "tables/users", "label": "Users", "type": "BigQuery Table", "description": "This table contains information about users registered on Stack Overflow, including detailed profile information, activity metrics, and network-wide identifiers.", "resource": "https://bigquery.googleapis.com/v2/projects/bigquery-public-data/datasets/stackoverflow/tables/users", "tags": ["Stack Overflow", "users", "profiles", "community", "schema", "data dump"], "color": "#3b82f6", "size": 43}}, {"data": {"id": "tables/votes", "label": "Votes", "type": "BigQuery Table", "description": "This table contains information about votes cast on posts within the Stack Overflow platform, including the vote type, associated post and user, and bounty details.", "resource": "https://bigquery.googleapis.com/v2/projects/bigquery-public-data/datasets/stackoverflow/tables/votes", "tags": ["votes", "posts", "stackoverflow", "community", "engagement", "schema", "data dump"], "color": "#3b82f6", "size": 43}}], "edges": [{"data": {"id": "datasets/stackoverflow__tables/badges", "source": "datasets/stackoverflow", "target": "tables/badges"}}, {"data": {"id": "datasets/stackoverflow__tables/comments", "source": "datasets/stackoverflow", "target": "tables/comments"}}, {"data": {"id": "datasets/stackoverflow__tables/post_history", "source": "datasets/stackoverflow", "target": "tables/post_history"}}, {"data": {"id": "datasets/stackoverflow__tables/posts_answers", "source": "datasets/stackoverflow", "target": "tables/posts_answers"}}, {"data": {"id": "datasets/stackoverflow__tables/posts_questions", "source": "datasets/stackoverflow", "target": "tables/posts_questions"}}, {"data": {"id": "datasets/stackoverflow__tables/tags", "source": "datasets/stackoverflow", "target": "tables/tags"}}, {"data": {"id": "datasets/stackoverflow__tables/users", "source": "datasets/stackoverflow", "target": "tables/users"}}, {"data": {"id": "datasets/stackoverflow__tables/votes", "source": "datasets/stackoverflow", "target": "tables/votes"}}, {"data": {"id": "references/pending_flags__references/flag_types", "source": "references/pending_flags", "target": "references/flag_types"}}, {"data": {"id": "references/pending_flags__references/close_reason_types", "source": "references/pending_flags", "target": "references/close_reason_types"}}, {"data": {"id": "references/pending_flags__references/close_as_off_topic_reason_types", "source": "references/pending_flags", "target": "references/close_as_off_topic_reason_types"}}, {"data": {"id": "references/post_feedback__references/vote_types", "source": "references/post_feedback", "target": "references/vote_types"}}, {"data": {"id": "references/post_notice_type_definitions__references/post_notice_class_ids", "source": "references/post_notice_type_definitions", "target": "references/post_notice_class_ids"}}, {"data": {"id": "references/post_notice_type_definitions__references/post_notice_duration_ids", "source": "references/post_notice_type_definitions", "target": "references/post_notice_duration_ids"}}, {"data": {"id": "references/post_notices__references/post_notice_types", "source": "references/post_notices", "target": "references/post_notice_types"}}, {"data": {"id": "references/review_rejection_reasons__references/post_type_ids", "source": "references/review_rejection_reasons", "target": "references/post_type_ids"}}, {"data": {"id": "references/review_task_results__references/review_task_result_types", "source": "references/review_task_results", "target": "references/review_task_result_types"}}, {"data": {"id": "references/review_task_results__references/review_rejection_reasons", "source": "references/review_task_results", "target": "references/review_rejection_reasons"}}, {"data": {"id": "references/review_tasks__references/review_task_types", "source": "references/review_tasks", "target": "references/review_task_types"}}, {"data": {"id": "references/review_tasks__references/review_task_states", "source": "references/review_tasks", "target": "references/review_task_states"}}, {"data": {"id": "references/review_tasks__references/review_task_results", "source": "references/review_tasks", "target": "references/review_task_results"}}, {"data": {"id": "references/suggested_edit_votes__references/suggested_edits", "source": "references/suggested_edit_votes", "target": "references/suggested_edits"}}, {"data": {"id": "references/suggested_edit_votes__references/vote_types", "source": "references/suggested_edit_votes", "target": "references/vote_types"}}, {"data": {"id": "tables/badges__tables/users", "source": "tables/badges", "target": "tables/users"}}, {"data": {"id": "tables/badges__references/badge_classes", "source": "tables/badges", "target": "references/badge_classes"}}, {"data": {"id": "tables/comments__datasets/stackoverflow", "source": "tables/comments", "target": "datasets/stackoverflow"}}, {"data": {"id": "tables/comments__tables/posts_questions", "source": "tables/comments", "target": "tables/posts_questions"}}, {"data": {"id": "tables/comments__tables/users", "source": "tables/comments", "target": "tables/users"}}, {"data": {"id": "tables/post_history__datasets/stackoverflow", "source": "tables/post_history", "target": "datasets/stackoverflow"}}, {"data": {"id": "tables/post_history__references/post_history_type_ids", "source": "tables/post_history", "target": "references/post_history_type_ids"}}, {"data": {"id": "tables/post_history__references/close_reason_types", "source": "tables/post_history", "target": "references/close_reason_types"}}, {"data": {"id": "tables/post_links__datasets/stackoverflow", "source": "tables/post_links", "target": "datasets/stackoverflow"}}, {"data": {"id": "tables/post_links__references/link_types", "source": "tables/post_links", "target": "references/link_types"}}, {"data": {"id": "tables/posts_answers__datasets/stackoverflow", "source": "tables/posts_answers", "target": "datasets/stackoverflow"}}, {"data": {"id": "tables/posts_answers__tables/posts_questions", "source": "tables/posts_answers", "target": "tables/posts_questions"}}, {"data": {"id": "tables/posts_answers__references/post_type_ids", "source": "tables/posts_answers", "target": "references/post_type_ids"}}, {"data": {"id": "tables/posts_moderator_nomination__tables/users", "source": "tables/posts_moderator_nomination", "target": "tables/users"}}, {"data": {"id": "tables/posts_orphaned_tag_wiki__datasets/stackoverflow", "source": "tables/posts_orphaned_tag_wiki", "target": "datasets/stackoverflow"}}, {"data": {"id": "tables/posts_questions__datasets/stackoverflow", "source": "tables/posts_questions", "target": "datasets/stackoverflow"}}, {"data": {"id": "tables/posts_questions__tables/posts_answers", "source": "tables/posts_questions", "target": "tables/posts_answers"}}, {"data": {"id": "tables/posts_questions__tables/users", "source": "tables/posts_questions", "target": "tables/users"}}, {"data": {"id": "tables/posts_questions__references/post_type_ids", "source": "tables/posts_questions", "target": "references/post_type_ids"}}, {"data": {"id": "tables/posts_tag_wiki__tables/tags", "source": "tables/posts_tag_wiki", "target": "tables/tags"}}, {"data": {"id": "tables/posts_tag_wiki__datasets/stackoverflow", "source": "tables/posts_tag_wiki", "target": "datasets/stackoverflow"}}, {"data": {"id": "tables/stackoverflow_posts__datasets/stackoverflow", "source": "tables/stackoverflow_posts", "target": "datasets/stackoverflow"}}, {"data": {"id": "tables/stackoverflow_posts__tables/posts_questions", "source": "tables/stackoverflow_posts", "target": "tables/posts_questions"}}, {"data": {"id": "tables/stackoverflow_posts__tables/posts_answers", "source": "tables/stackoverflow_posts", "target": "tables/posts_answers"}}, {"data": {"id": "tables/tags__datasets/stackoverflow", "source": "tables/tags", "target": "datasets/stackoverflow"}}, {"data": {"id": "tables/users__datasets/stackoverflow", "source": "tables/users", "target": "datasets/stackoverflow"}}, {"data": {"id": "tables/votes__datasets/stackoverflow", "source": "tables/votes", "target": "datasets/stackoverflow"}}, {"data": {"id": "tables/votes__references/vote_types", "source": "tables/votes", "target": "references/vote_types"}}], "bodies": {"datasets/stackoverflow": "The Stack Overflow public dataset in BigQuery provides a comprehensive collection of data from the popular question and answer platform. This dataset is a valuable resource for researchers and developers interested in analyzing trends in programming questions, user interactions, and the evolution of technology discussions. It encompasses various aspects of the platform, including user profiles, questions, answers, comments, votes, badges awarded, and associated tags.\n\nThis dataset was last updated on 2022-11-25, and it is important to note that it is no longer actively maintained. Despite this, it remains a rich historical archive of Stack Overflow activity. The dataset is hosted in the `US` multi-region.\n\n# Schema\n\nAs a BigQuery Dataset, `stackoverflow` serves as a container for numerous tables rather than having a schema itself. The tables within this dataset collectively represent the structure of Stack Overflow data. Key tables include:\n\n*   [badges](/tables/badges.md): Information about badges awarded to users.\n*   [comments](/tables/comments.md): User comments on posts.\n*   [post_history](/tables/post_history.md): Historical revisions and events for posts.\n*   [posts_answers](/tables/posts_answers.md): Detailed information about answers.\n*   [posts_questions](/tables/posts_questions.md): Detailed information about questions.\n*   [tags](/tables/tags.md): Information about tags used to categorize posts.\n*   [users](/tables/users.md): User profiles and statistics.\n*   [votes](/tables/votes.md): Records of upvotes and downvotes on posts and comments.\n\n# Common query patterns\n\nList all tables within the `stackoverflow` dataset:\n\n```sql\nSELECT table_id\nFROM `bigquery-public-data.stackoverflow.INFORMATION_SCHEMA.TABLES`\nWHERE table_schema = 'stackoverflow';\n```\n\nExample of querying the `posts_questions` table:\n\n```sql\nSELECT\n  id,\n  title,\n  view_count,\n  creation_date\nFROM\n  `bigquery-public-data.stackoverflow.posts_questions`\nWHERE\n  creation_date BETWEEN '2021-01-01' AND '2021-01-31'\nORDER BY\n  view_count DESC\nLIMIT 5;\n```\n\n# Citations\n\n[1] [Stack Overflow Public Dataset](https://bigquery.googleapis.com/v2/projects/bigquery-public-data/datasets/stackoverflow)\n[2] [Stack Overflow Official Website](https://stackoverflow.com/)", "references/badge_classes": "# Badge Classes\n\nThis document defines the enumerated classes for badges awarded on Stack Exchange sites.\n\n- `1`: Gold\n- `2`: Silver\n- `3`: Bronze\n\n# Citations\n- [Database schema documentation for the public data dump and SEDE](https://meta.stackexchange.com/questions/2677/database-schema-documentation-for-the-public-data-dump-and-sede)", "references/close_as_off_topic_reason_types": "This table defines the enumerated reasons and associated guidance for why a post might be closed as off-topic.\n\n## Schema\n- `Id` (INTEGER) - Unique identifier for the reason type.\n- `IsUniversal` (BOOLEAN) - Indicates if the reason is universally applicable.\n- `InputTitle` (STRING) - The title shown for input.\n- `MarkdownInputGuidance` (STRING) - Markdown guidance shown while flagging/voting.\n- `MarkdownPostOwnerGuidance` (STRING) - Markdown guidance shown to the original poster when closed.\n- `MarkdownPublicGuidance` (STRING) - Markdown guidance shown to privileged users when closed.\n- `MarkdownConcensusDescription` (STRING) - Markdown description shown above the public or post owner guidance. Nullable.\n- `CreationDate` (TIMESTAMP) - The date and time the reason type was created.\n- `CreationModeratorId` (INTEGER) - The ID of the moderator who created the reason type. Links to the `users` table.\n- `ApprovalDate` (TIMESTAMP) - The date and time the reason type was approved.\n- `ApprovalModeratorId` (INTEGER) - The ID of the moderator who approved the reason type.\n- `DeactivationDate` (TIMESTAMP) - The date and time the reason type was deactivated.\n- `DeactivationModeratorId` (INTEGER) - The ID of the moderator who deactivated the reason type. Links to the `users` table.\n\n# Citations\n- [Database schema documentation for the public data dump and SEDE](https://meta.stackexchange.com/questions/2677/database-schema-documentation-for-the-public-data-dump-and-sede)", "references/close_reason_types": "This document defines the enumerated types for reasons why a post might be closed on Stack Exchange sites, as found in the `PendingFlags` and `PostHistory` tables.\n\n## Old Close Reasons\n- `1`: Exact Duplicate\n- `2`: Off-topic\n- `3`: Subjective and argumentative\n- `4`: Not a real question\n- `7`: Too localized\n- `10`: General reference\n- `20`: Noise or pointless (Meta sites only)\n\n## Current Close Reasons\n- `101`: Duplicate\n- `102`: Off-topic\n- `103`: Unclear what you\\'re asking\n- `104`: Too broad\n- `105`: Primarily opinion-based\n\n# Citations\n- [Database schema documentation for the public data dump and SEDE](https://meta.stackexchange.com/questions/2677/database-schema-documentation-for-the-public-data-dump-and-sede)", "references/creative_commons_by_sa_4_0_license": "All user content contributed to the Stack Exchange network is licensed under the Creative Commons Attribution-ShareAlike 4.0 International License (CC BY-SA 4.0). While this license is permissive, it requires attribution.\n\n## Attribution Requirements for Stack Exchange Content:\n1.  Visually display or otherwise indicate the source of the content as coming from the Stack Exchange Network. This requirement is satisfied with a discreet text blurb, or some other unobtrusive but clear visual indication.\n2.  Ensure that any Internet use of the content includes a hyperlink directly to the original question on the source site on the Network (e.g., `http://stackoverflow.com/questions/12345`).\n3.  Visually display or otherwise clearly indicate the author names for every question and answer used.\n4.  Ensure that any Internet use of the content includes a hyperlink for each author name directly back to his or her user profile page on the source site on the Network (e.g., `http://stackoverflow.com/users/12345/username`), directly to the Stack Exchange domain, in standard HTML (i.e. not through a Tinyurl or other such indirect hyperlink, form of obfuscation or redirection), without any \u201cnofollow\u201d command or any other such means of avoiding detection by search engines, and visible even with JavaScript disabled.\n\nFor more information, see the [Stack Exchange Terms of Service](https://stackexchange.com/legal/terms-of-service).\n\n# Citations\n- [Stack Exchange Data Dump : Internet Archive](https://archive.org/details/stackexchange)\n- [Creative Commons Attribution-ShareAlike 4.0 International License](https://creativecommons.org/licenses/by-sa/4.0/)\n- [Stack Exchange Terms of Service](https://stackexchange.com/legal/terms-of-service)", "references/flag_types": "This document defines the enumerated types for flags related to post moderation on Stack Exchange sites, as found in the `PendingFlags` table.\n\n- `13`: Canned flag for closure\n- `14`: Vote to close\n- `15`: Vote to reopen\n\n# Citations\n- [Database schema documentation for the public data dump and SEDE](https://meta.stackexchange.com/questions/2677/database-schema-documentation-for-the-public-data-dump-and-sede)", "references/link_types": "This document defines the enumerated types for links between posts, as found in the `PostLinks` table.\n\n- `1`: Linked (`PostId` contains a link to `RelatedPostId`)\n- `3`: Duplicate (`PostId` is a duplicate of `RelatedPostId`)\n\n# Citations\n- [Database schema documentation for the public data dump and SEDE](https://meta.stackexchange.com/questions/2677/database-schema-documentation-for-the-public-data-dump-and-sede)", "references/pending_flags": "This table contains information about pending flags and votes related to post moderation, despite its name focusing on \"PendingFlags\". It includes close-related flags and votes.\n\n## Schema\n- `Id` (INTEGER) - Unique identifier for the pending flag.\n- `FlagTypeId` (INTEGER) - The type of flag. See the [Flag Types reference](/references/flag_types.md) for possible values:\n    - `13`: canned flag for closure\n    - `14`: vote to close\n    - `15`: vote to reopen\n- `PostId` (INTEGER) - The ID of the post the flag is associated with. Links to the `posts` tables (`posts_questions` or `posts_answers`).\n- `CreationDate` (TIMESTAMP) - The date and time the flag was created.\n- `CloseReasonTypeId` (INTEGER) - The type of close reason, if applicable. See the [Close Reason Types reference](/references/close_reason_types.md) for possible values.\n- `CloseAsOffTopicReasonTypeId` (INTEGER) - The specific off-topic reason ID, if `CloseReasonTypeId = 102` (off-topic). Links to the [Close As Off-Topic Reason Types reference](/references/close_as_off_topic_reason_types.md).\n- `DuplicateOfQuestionId` (INTEGER) - The ID of the duplicate question, if `CloseReasonTypeId` is `1` or `101` (old or current duplicate). Links to the `posts_questions` table.\n- `BelongsOnBaseHostAddress` (STRING) - Indicates the base host address for votes to close and migrate.\n\n# Citations\n- [Database schema documentation for the public data dump and SEDE](https://meta.stackexchange.com/questions/2677/database-schema-documentation-for-the-public-data-dump-and-sede)", "references/post_feedback": "This table collects up and down votes from anonymous visitors and/or unregistered users.\n\n## Schema\n- `Id` (INTEGER) - Unique identifier for the post feedback entry.\n- `PostId` (INTEGER) - The ID of the post (`posts_questions` or `posts_answers`) the feedback is for.\n- `IsAnonymous` (BOOLEAN) - Indicates if the feedback was given anonymously.\n- `VoteTypeId` (INTEGER) - The type of vote. Specifically `2` for UpMod and `3` for DownMod in this table. See the [Vote Types reference](/references/vote_types.md) for a comprehensive list.\n- `CreationDate` (TIMESTAMP) - The date and time the feedback was recorded.\n\n# Citations\n- [Database schema documentation for the public data dump and SEDE](https://meta.stackexchange.com/questions/2677/database-schema-documentation-for-the-public-data-dump-and-sede)", "references/post_history_type_ids": "This document defines the enumerated types for various events recorded in the `PostHistory` table, tracking changes and moderation actions on posts across Stack Exchange sites.\n\n- `1`: Initial Title - initial title (questions only)\n- `2`: Initial Body - initial post raw body text\n- `3`: Initial Tags - initial list of tags (questions only)\n- `4`: Edit Title - modified title (questions only)\n- `5`: Edit Body - modified post body (raw markdown)\n- `6`: Edit Tags - modified list of tags (questions only)\n- `7`: Rollback Title - reverted title (questions only)\n- `8`: Rollback Body - reverted body (raw markdown)\n- `9`: Rollback Tags - reverted list of tags (questions only)\n- `10`: Post Closed - post voted to be closed\n- `11`: Post Reopened - post voted to be reopened\n- `12`: Post Deleted - post voted to be removed\n- `13`: Post Undeleted - post voted to be restored\n- `14`: Post Locked - post locked by moderator\n- `15`: Post Unlocked - post unlocked by moderator\n- `16`: Community Owned - post now community owned\n- `17`: Post Migrated - post migrated - now replaced by 35/36 (away/here)\n- `18`: Question Merged - question merged with deleted question\n- `19`: Question Protected - question was protected by a moderator.\n- `20`: Question Unprotected - question was unprotected by a moderator.\n- `21`: Post Disassociated - OwnerUserId removed from post by admin\n- `22`: Question Unmerged - answers/votes restored to previously merged question\n- `24`: Suggested Edit Applied\n- `25`: Post Tweeted\n- `31`: Comment discussion moved to chat\n- `33`: Post notice added - `comment` contains foreign key to PostNotices\n- `34`: Post notice removed - `comment` contains foreign key to PostNotices\n- `35`: Post migrated away - replaces id 17\n- `36`: Post migrated here - replaces id 17\n- `37`: Post merge source\n- `38`: Post merge destination\n- `50`: Bumped by Community User\n- `52`: Question became hot network question (main) / Hot Meta question (meta)\n- `53`: Question removed from hot network/meta questions by a moderator\n- `66`: Created from Ask Wizard\n\n## Older Dumps (Likely no longer present)\n- `23`: Unknown dev related event\n- `26`: Vote nullification by dev (ERM?)\n- `27`: Post unmigrated/hidden moderator migration?\n- `28`: Unknown suggestion event\n- `29`: Unknown moderator event (possibly de-wikification?)\n- `30`: Unknown event (too rare to guess)\n\n# Citations\n- [Database schema documentation for the public data dump and SEDE](https://meta.stackexchange.com/questions/2677/database-schema-documentation-for-the-public-data-dump-and-sede)", "references/post_notice_class_ids": "This document defines the enumerated class identifiers for different types of post notices.\n\n- `0`: DMCA or Redditted\n- `1`: Historical lock\n- `2`: Bounty\n- `4`: Moderator notice (lock)\n\n# Citations\n- [Database schema documentation for the public data dump and SEDE](https://meta.stackexchange.com/questions/2677/database-schema-documentation-for-the-public-data-dump-and-sede)", "references/post_notice_duration_ids": "This document defines the enumerated duration identifiers for post notices.\n\n- `-1`: No duration specified\n- `1`: 7 days (bounty)\n\n# Citations\n- [Database schema documentation for the public data dump and SEDE](https://meta.stackexchange.com/questions/2677/database-schema-documentation-for-the-public-data-dump-and-sede)", "references/post_notice_type_definitions": "This table defines the structure and properties of different types of post notices that can be applied to posts.\n\n## Schema\n- `Id` (INTEGER) - Unique identifier for the post notice type.\n- `ClassId` (INTEGER) - The class of the notice. See the [Post Notice Class IDs reference](/references/post_notice_class_ids.md) for possible values.\n- `Name` (STRING) - The name of the post notice type.\n- `Body` (STRING) - Contains the default notice text. Nullable.\n- `IsHidden` (BOOLEAN) - Indicates if the notice type is hidden.\n- `Predefined` (BOOLEAN) - Indicates if the notice type is predefined.\n- `PostNoticeDurationId` (INTEGER) - The duration identifier for the notice. See the [Post Notice Duration IDs reference](/references/post_notice_duration_ids.md) for possible values.\n\n# Citations\n- [Database schema documentation for the public data dump and SEDE](https://meta.stackexchange.com/questions/2677/database-schema-documentation-for-the-public-data-dump-and-sede)", "references/post_notice_types": "This document defines the enumerated types for notices that can be applied to posts on Stack Exchange sites, as found in the `PostNotices` table.\n\n- `1`: Citation needed\n- `2`: Current event\n- `3`: Insufficient explanation\n- `10`: Current answers are outdated\n- `11`: Draw attention\n- `12`: Improve details\n- `13`: Authoritative reference needed\n- `14`: Canonical answer required\n- `15`: Reward existing answer\n- `20`: Content dispute\n- `21`: Offtopic comments\n- `22`: Historical significance\n- `23`: Wiki Answer\n- `24`: Policy Lock (SO Collectives)\n- `25`: Recommended Answer (SO Collectives)\n- `26`: Posted by Recognized Member/Admin (SO Collectives)\n- `27`: Endorsed Edit (SO Collectives)\n- `28`: Obsolete (SO Collectives)\n- `1000`: Redditted (SO)\n- `9001`: DMCA Takedown\n\n# Citations\n- [Database schema documentation for the public data dump and SEDE](https://meta.stackexchange.com/questions/2677/database-schema-documentation-for-the-public-data-dump-and-sede)", "references/post_notices": "This table stores information about notices applied to posts, such as \"Citation needed\" or \"Duplicate\".\n\n## Schema\n- `Id` (INTEGER) - Unique identifier for the post notice.\n- `PostId` (INTEGER) - The ID of the post the notice is applied to. Links to the `posts` tables (`posts_questions` or `posts_answers`).\n- `PostNoticeTypeId` (INTEGER) - The type of post notice. See the [Post Notice Types reference](/references/post_notice_types.md) for possible values.\n- `CreationDate` (TIMESTAMP) - The date and time the notice was created.\n- `DeletionDate` (TIMESTAMP) - The date and time the notice was deleted. Nullable.\n- `ExpiryDate` (TIMESTAMP) - The date and time the notice is set to expire. Nullable.\n- `Body` (STRING) - When present, contains the custom text shown with the notice. Nullable.\n- `OwnerUserId` (INTEGER) - The ID of the user who created the notice. Links to the `users` table. Nullable.\n- `DeletionUserId` (INTEGER) - The ID of the user who deleted the notice. Links to the `users` table. Nullable.\n\n# Citations\n- [Database schema documentation for the public data dump and SEDE](https://meta.stackexchange.com/questions/2677/database-schema-documentation-for-the-public-data-dump-and-sede)", "references/post_type_ids": "# Post Type IDs\n\nThis document defines the enumerated IDs for different types of posts found in the Stack Exchange data dump and SEDE.\n\n- `1`: Question\n- `2`: Answer\n- `3`: Orphaned Tag Wiki\n- `4`: Tag Wiki\n- `5`: Tag Wiki Excerpt\n- `6`: Moderator Nomination\n- `7`: Privilege Wiki\n- `8`: Status Wiki\n- `10`: Deleted Question (not in public data dump)\n- `11`: Section\n- `12`: Article\n\n# Citations\n- [Database schema documentation for the public data dump and SEDE](https://meta.stackexchange.com/questions/2677/database-schema-documentation-for-the-public-data-dump-and-sede)", "references/related_questions": "This table provides a mapping between questions and other related questions, based on factors like content similarity or user behavior.\n\n## Schema\n- `PostId` (INTEGER) - The ID of the primary question. Links to the `posts_questions` table.\n- `RelatedPostId` (INTEGER) - The ID of a related question. Links to the `posts_questions` table.\n- `Position` (INTEGER) - The position or ranking of the related question.\n- `Score` (INTEGER) - A score indicating the relevance or strength of the relationship.\n\n# Citations\n- [Database schema documentation for the public data dump and SEDE](https://meta.stackexchange.com/questions/2677/database-schema-documentation-for-the-public-data-dump-and-sede)", "references/review_rejection_reasons": "This table defines canned rejection reasons for suggested edits.\n\n## Schema\n- `Id` (INTEGER) - Unique identifier for the rejection reason.\n- `Name` (STRING) - The name of the rejection reason.\n- `Description` (STRING) - A detailed description of the rejection reason.\n- `PostTypeId` (INTEGER) - The type of post the reason applies to (e.g., `5` for Wiki, `6` for Excerpt). Otherwise, it is null. Links to the [Post Type IDs reference](/references/post_type_ids.md).\n\n# Citations\n- [Database schema documentation for the public data dump and SEDE](https://meta.stackexchange.com/questions/2677/database-schema-documentation-for-the-public-data-dump-and-sede)", "references/review_task_result_types": "This document defines the enumerated types for the outcomes of various review tasks on Stack Exchange sites.\n\n- `1`: Skip\n- `2`: Approve (suggested edits)\n- `3`: Reject (suggested edits)\n- `4`: Delete (low quality)\n- `5`: Edit (first posts, late answers, low quality)\n- `6`: Close (close, low quality)\n- `7`: Looks OK (low quality)\n- `8`: Do Not Close (close)\n- `9`: Recommend Deletion (low quality answer)\n- `10`: Recommend Close (low quality question)\n- `11`: Other Action (first posts), previously \"I\\'m Done\"\n- `12`: Reopen (reopen)\n- `13`: Leave Closed (reopen)\n- `14`: Edit and Reopen (reopen)\n- `15`: Excellent (community evaluation)\n- `16`: Satisfactory (community evaluation)\n- `17`: Needs Improvement (community evaluation)\n- `18`: No Action Needed (first posts, late answers)\n\n# Citations\n- [Database schema documentation for the public data dump and SEDE](https://meta.stackexchange.com/questions/2677/database-schema-documentation-for-the-public-data-dump-and-sede)", "references/review_task_results": "This table stores the outcomes and details of completed review tasks, such as approvals, rejections, or edits.\n\n## Schema\n- `Id` (INTEGER) - Unique identifier for the review task result.\n- `ReviewTaskId` (INTEGER) - The ID of the review task this result is for. Links to the `ReviewTasks` table.\n- `ReviewTaskResultTypeId` (INTEGER) - The type of result. See the [Review Task Result Types reference](/references/review_task_result_types.md) for possible values.\n- `CreationDate` (TIMESTAMP) - The date when the result was recorded. Time data is purposefully removed to protect user privacy.\n- `RejectionReasonId` (INTEGER) - The ID of the rejection reason, specifically for suggested edits. Links to the [Review Rejection Reasons reference](/references/review_rejection_reasons.md). Nullable.\n- `Comment` (STRING) - A comment associated with the review result. Nullable.\n\n# Citations\n- [Database schema documentation for the public data dump and SEDE](https://meta.stackexchange.com/questions/2677/database-schema-documentation-for-the-public-data-dump-and-sede)", "references/review_task_states": "This document defines the enumerated states for review tasks on Stack Exchange sites.\n\n- `1`: Active\n- `2`: Completed\n- `3`: Invalidated\n\n# Citations\n- [Database schema documentation for the public data dump and SEDE](https://meta.stackexchange.com/questions/2677/database-schema-documentation-for-the-public-data-dump-and-sede)", "references/review_task_types": "This document defines the enumerated types for various review tasks available on Stack Exchange sites.\n\n- `1`: Suggested Edit\n- `2`: Close Votes\n- `3`: Low Quality Posts\n- `4`: First Post\n- `5`: Late Answer\n- `6`: Reopen Vote\n- `7`: Community Evaluation\n- `8`: Link Validation\n- `9`: Flagged Posts\n- `10`: Triage\n- `11`: Helper\n- `12`: First Questions\n- `13`: First Answers\n\n# Citations\n- [Database schema documentation for the public data dump and SEDE](https://meta.stackexchange.com/questions/2677/database-schema-documentation-for-the-public-data-dump-and-sede)", "references/review_tasks": "This table stores information about moderation review tasks on Stack Exchange, such as suggested edits or close votes.\n\n## Schema\n- `Id` (INTEGER) - Unique identifier for the review task.\n- `ReviewTaskTypeId` (INTEGER) - The type of review task. See the [Review Task Types reference](/references/review_task_types.md) for possible values.\n- `CreationDate` (TIMESTAMP) - The date when the review task was created. Time data is typically removed to protect user privacy.\n- `DeletionDate` (TIMESTAMP) - The date when the review task was deleted. Time data is typically removed to protect user privacy. Nullable.\n- `ReviewTaskStateId` (INTEGER) - The current state of the review task. See the [Review Task States reference](/references/review_task_states.md) for possible values.\n- `PostId` (INTEGER) - The ID of the post associated with the review task. Links to the `posts` tables (`posts_questions` or `posts_answers`). Nullable.\n- `SuggestedEditId` (INTEGER) - The ID of the suggested edit associated with the review task, if applicable. Links to the `SuggestedEdits` table. Nullable.\n- `CompletedByReviewTaskId` (INTEGER) - The ID associated with the `ReviewTaskResult` that stores the outcome of a completed review. Links to the [Review Task Results reference](/references/review_task_results.md). Nullable.\n\n# Citations\n- [Database schema documentation for the public data dump and SEDE](https://meta.stackexchange.com/questions/2677/database-schema-documentation-for-the-public-data-dump-and-sede)", "references/sede_databases": "This internal table in the Stack Exchange Data Explorer (SEDE) provides metadata about each Stack Exchange site\\'s database within SEDE.\n\n## Schema\n- `database_id` (INTEGER) - Unique identifier for the database.\n- `database_name` (STRING) - The name of the database.\n- `site_name` (STRING) - The short name of the site.\n- `tiny_name` (STRING) - A very short name for the site.\n- `long_name` (STRING) - The full name of the site.\n- `site_type` (STRING) - Type of site, either \\'main_site\\' or \\'meta_site\\'.\n- `site_url` (STRING) - The base URL of the Stack Exchange site.\n- `sede_url` (STRING) - The URL to the site\\'s data in SEDE.\n- `api_site_parameter` (STRING) - The parameter used for the site in the Stack Exchange API.\n- `initialized` (TIMESTAMP) - Datetime when populating that database started.\n- `made_available` (TIMESTAMP) - Datetime when the database came online and was ready for queries.\n- `processing_time` (STRING) - The duration between `initialized` and `made_available`, in `hh:mm:ss.fff` format.\n- `questions` (INTEGER) - Total number of questions in this site at the time of the current refresh.\n- `answers` (INTEGER) - Total number of answers in this site at the time of the current refresh.\n- `latest_post` (TIMESTAMP) - The timestamp of the last non-deleted post captured in this refresh.\n- `notes` (STRING) - This will be non-NULL when a database is in transition. Nullable.\n\n# Citations\n- [Database schema documentation for the public data dump and SEDE](https://meta.stackexchange.com/questions/2677/database-schema-documentation-for-the-public-data-dump-and-sede)", "references/sede_databases_markdown": "This internal SEDE table contains markdown content related to database information, likely for display purposes.\n\n## Schema\n- `rn` (INTEGER) - Row number, used for sorting by the \\'long name\\' of the database.\n- `content` (STRING) - Markdown content, potentially including headers, for database descriptions.\n\n# Citations\n- [Database schema documentation for the public data dump and SEDE](https://meta.stackexchange.com/questions/2677/database-schema-documentation-for-the-public-data-dump-and-sede)", "references/sede_ineachdb": "This is an internal stored procedure in the Stack Exchange Data Explorer (SEDE) used to execute SQL commands across multiple databases (i.e., Stack Exchange sites).\n\n## Parameters\n| Parameter           | Data Type      | Default | Description                                                               |\n|---------------------|----------------|---------|---------------------------------------------------------------------------|\n| `@SQLCommand`       | `nvarchar(4000)` |         | The SQL statement to run.                                                 |\n| `@IncludeMainSites` | `bit`          | `1`     | Set to `1` to include all non-meta sites.                                 |\n| `@IncludeMetaSites` | `bit`          | `1`     | Set to `1` to include all meta sites.                                     |\n| `@IncludeMainMeta`  | `bit`          | `1`     | Set to `1` to include `StackExchange.Meta`.                               |\n| `@CollectResultsForMe` | `bit`          | `1`     | For standard `SELECT` queries, this will attempt to put each database's results into a `#temp` table. |\n| `@ErrorOnSkippedSites` | `bit`          | `0`     | Set this to `1` if you want execution to halt in the event any site is missing due to transition change. |\n\n# Citations\n- [Database schema documentation for the public data dump and SEDE](https://meta.stackexchange.com/questions/2677/database-schema-documentation-for-the-public-data-dump-and-sede)", "references/sede_sites": "This internal table in the Stack Exchange Data Explorer (SEDE) provides metadata about each Stack Exchange site.\n\n## Schema\n- `site_name` (STRING) - The short name of the site.\n- `site_url` (STRING) - The base URL of the Stack Exchange site.\n- `database_name` (STRING) - The name of the corresponding database in SEDE.\n- `long_name` (STRING) - The full name of the site.\n- `site_id` (INTEGER) - Unique identifier for the site.\n\n# Citations\n- [Database schema documentation for the public data dump and SEDE](https://meta.stackexchange.com/questions/2677/database-schema-documentation-for-the-public-data-dump-and-sede)", "references/sede_tables": "This internal table in the Stack Exchange Data Explorer (SEDE) provides metadata about each table within SEDE databases.\n\n## Schema\n- `database_id` (INTEGER) - The ID of the database, originating from `sys.databases`.\n- `database_name` (STRING) - The name of the database, originating from `sys.databases`.\n- `table_name` (STRING) - The name of the table, originating from `sys.tables`.\n- `latest_date` (TIMESTAMP) - The latest timestamp (e.g., `CreationDate`) for tables that have such a column. Nullable.\n- `row_count` (INTEGER) - The number of rows in the table, according to `sys.partitions`. For `Posts`, this includes `PostsWithDeleted`; for non-deleted `Posts`, refer to `answers + questions` from `dbo.sede_databases`.\n- `initialized` (TIMESTAMP) - Timestamp of initial table creation.\n- `made_available` (TIMESTAMP) - Timestamp of the final operation against the table.\n- `processing_time` (STRING) - Duration of `initialized` -> `made_available`, in `{hh:mm:ss.fff}` format.\n\n# Citations\n- [Database schema documentation for the public data dump and SEDE](https://meta.stackexchange.com/questions/2677/database-schema-documentation-for-the-public-data-dump-and-sede)", "references/sede_users": "This internal table in the Stack Exchange Data Explorer (SEDE) provides user-specific metadata across sites.\n\n## Schema\n- `account_id` (INTEGER) - The global Stack Exchange Network account ID.\n- `site_id` (INTEGER) - The ID of the site the user is associated with. Links to `references/sede_sites.md`.\n- `user_id` (INTEGER) - The local user ID on that specific site. Links to the `users` table.\n- `reputation` (INTEGER) - The user\\'s reputation on that specific site.\n- `question_count` (INTEGER) - The number of questions asked by the user on that specific site.\n- `answer_count` (INTEGER) - The number of answers provided by the user on that specific site.\n\n# Citations\n- [Database schema documentation for the public data dump and SEDE](https://meta.stackexchange.com/questions/2677/database-schema-documentation-for-the-public-data-dump-and-sede)", "references/suggested_edit_votes": "This table records votes cast on suggested edits, indicating approval or rejection.\n\n## Schema\n- `Id` (INTEGER) - Unique identifier for the suggested edit vote.\n- `SuggestedEditId` (INTEGER) - The ID of the suggested edit that was voted on. Links to the [Suggested Edits reference](/references/suggested_edits.md).\n- `UserId` (INTEGER) - The ID of the user who cast the vote. Links to the `users` table.\n- `VoteTypeId` (INTEGER) - The type of vote. Specifically `2` for Approve (UpMod) and `3` for Reject (DownMod). See the [Vote Types reference](/references/vote_types.md) for a comprehensive list.\n- `CreationDate` (TIMESTAMP) - The date and time the vote was cast.\n- `TargetUserId` (INTEGER) - The ID of the target user for the vote (e.g., the user whose reputation changed). Links to the `users` table. Nullable.\n- `TargetRepChange` (INTEGER) - The change in reputation for the target user as a result of this vote. Nullable.\n\n# Citations\n- [Database schema documentation for the public data dump and SEDE](https://meta.stackexchange.com/questions/2677/database-schema-documentation-for-the-public-data-dump-and-sede)", "references/suggested_edits": "This table stores information about suggested edits to posts that are awaiting review. If both `ApprovalDate` and `RejectionDate` are null, then the edit is still in review.\n\n## Schema\n- `Id` (INTEGER) - Unique identifier for the suggested edit.\n- `PostId` (INTEGER) - The ID of the post to which the suggested edit applies. Links to the `posts` tables (`posts_questions` or `posts_answers`).\n- `CreationDate` (TIMESTAMP) - The date and time the suggested edit was created.\n- `ApprovalDate` (TIMESTAMP) - The date and time the suggested edit was approved. Null if not yet approved.\n- `RejectionDate` (TIMESTAMP) - The date and time the suggested edit was rejected. Null if not yet rejected.\n- `OwnerUserId` (INTEGER) - The ID of the user who suggested the edit. Links to the `users` table.\n- `Comment` (STRING) - A comment provided with the suggested edit. Nullable.\n- `Text` (STRING) - The proposed new body text for the post. Nullable.\n- `Title` (STRING) - The proposed new title for the post. Nullable.\n- `Tags` (STRING) - The proposed new tags for the post. Nullable.\n- `RevisionGUID` (STRING) - A GUID for the revision.\n\n# Citations\n- [Database schema documentation for the public data dump and SEDE](https://meta.stackexchange.com/questions/2677/database-schema-documentation-for-the-public-data-dump-and-sede)", "references/tag_synonyms": "This table stores relationships between synonymous tags, allowing for automatic renaming or suggestion of alternative tags.\n\n## Schema\n- `Id` (INTEGER) - Unique identifier for the tag synonym.\n- `SourceTagName` (STRING) - The name of the tag that is considered a synonym. Nullable. Links to the `tags` table\\'s `tag_name` field.\n- `TargetTagName` (STRING) - The name of the canonical tag to which `SourceTagName` refers. Nullable. Links to the `tags` table\\'s `tag_name` field.\n- `CreationDate` (TIMESTAMP) - The date and time the tag synonym was created.\n- `OwnerUserId` (INTEGER) - The ID of the user who created the tag synonym. Nullable. Links to the `users` table.\n- `AutoRenameCount` (INTEGER) - The number of times this synonym has resulted in an automatic tag rename.\n- `LastAutoRename` (TIMESTAMP) - The date and time of the last automatic rename using this synonym. Nullable.\n- `Score` (INTEGER) - A score indicating the quality or consensus of the synonym.\n- `ApprovedByUserId` (INTEGER) - The ID of the user who approved the tag synonym. Nullable. Links to the `users` table.\n- `ApprovalDate` (TIMESTAMP) - The date and time the tag synonym was approved. Nullable.\n\n# Citations\n- [Database schema documentation for the public data dump and SEDE](https://meta.stackexchange.com/questions/2677/database-schema-documentation-for-the-public-data-dump-and-sede)", "references/vote_types": "This document defines the enumerated types for various votes that can occur on posts and other entities across Stack Exchange sites.\n\n- `-1`: InformModerator\n- `0`: UndoMod\n- `1`: AcceptedByOriginator\n- `2`: UpMod (Upvote)\n- `3`: DownMod (Downvote)\n- `4`: Offensive\n- `5`: Favorite (Bookmark) - feature removed after October 2022, replaced by Saves.\n- `6`: Close - Close votes are only stored in the `PostHistory` table after 2013-06-25.\n- `7`: Reopen\n- `8`: BountyStart\n- `9`: BountyClose\n- `10`: Deletion\n- `11`: Undeletion\n- `12`: Spam\n- `15`: ModeratorReview - a moderator looking at a flagged post.\n- `16`: ApproveEditSuggestion\n- `17`: Reaction1 (Teams: celebrate)\n- `18`: Helpful\n- `19`: ThankYou\n- `20`: WellWritten\n- `21`: Follow\n- `22`: Reaction2 (Teams: smile)\n- `23`: Reaction3 (Teams: mind blown)\n- `24`: Reaction4 (Teams: clap)\n- `25`: Reaction5 (Teams: heart)\n- `26`: Reaction6 (Teams: fire)\n- `27`: Reaction7 (Teams: trophy)\n- `28`: Reaction8 (Teams: wave)\n- `29`: Outdated\n- `30`: NotOutdated\n- `31`: PreVote\n- `32`: CollectiveDiscussionUpvote\n- `33`: CollectiveDiscussionDownvote (no longer used)\n- `35`: privateAiAnswerCorrect\n- `36`: privateAiAnswerIncorrect\n- `37`: privateAiAnswerPartiallyCorrect\n\n# Citations\n- [Database schema documentation for the public data dump and SEDE](https://meta.stackexchange.com/questions/2677/database-schema-documentation-for-the-public-data-dump-and-sede)", "tables/badges": "The `badges` table records all badges awarded to users on the Stack Overflow Q&A platform. Each row represents a single badge awarded, detailing its unique identifier, name, the date it was awarded, the ID of the user who received it, its class (e.g., gold, silver, bronze), and whether it is a tag-based badge. The data spans from October 26, 2016, up to November 24, 2022. This table can be joined with the [users](/tables/users.md) table on `user_id` to get more information about the badge recipients.\n\n# Schema\n\n- `id` (INTEGER) - Unique identifier for the badge award.\n- `name` (STRING) - Name of the badge.\n- `date` (TIMESTAMP) - Timestamp when the badge was awarded (e.g., `2008-09-15T08:55:03.923`).\n- `user_id` (INTEGER) - Identifier of the user who received the badge.\n- `class` (INTEGER) - The class of the badge. See the [Badge Classes reference](/references/badge_classes.md) for possible values.\n- `tag_based` (BOOLEAN) - `True` if the badge is for a tag, otherwise it is a named badge.\n\n# Common query patterns\n\n```sql\nSELECT\n    name,\n    COUNT(*) AS badge_count\n  FROM\n    `bigquery-public-data.stackoverflow.badges`\n  GROUP BY\n    name\n  ORDER BY\n    badge_count DESC\n  LIMIT 5;\n```\n\n```sql\nSELECT\n    b.name,\n    b.date\n  FROM\n    `bigquery-public-data.stackoverflow.badges` AS b\n    JOIN `bigquery-public-data.stackoverflow.users` AS u ON b.user_id = u.id\n  WHERE\n    u.display_name = \\'Jon Skeet\\'\n  ORDER BY\n    b.date DESC;\n```\n\n```sql\nSELECT\n    DATE(date) AS award_date,\n    COUNT(*) AS badges_awarded\n  FROM\n    `bigquery-public-data.stackoverflow.badges`\n  GROUP BY\n    award_date\n  ORDER BY\n    award_date DESC\n  LIMIT 10;\n```\n\n# Citations\n\n[1] [BigQuery Public Data: stackoverflow.badges](https://bigquery.googleapis.com/v2/projects/bigquery-public-data/datasets/stackoverflow/tables/badges)\n[2] [Stack Overflow](https://stackoverflow.com/)\n[3] [Database schema documentation for the public data dump and SEDE](https://meta.stackexchange.com/questions/2677/database-schema-documentation-for-the-public-data-dump-and-sede)", "tables/comments": "The `comments` table in the [Stack Overflow dataset](/datasets/stackoverflow.md) captures all user-generated comments on various posts across the platform. Each row in this table represents a unique comment, providing details such as the comment\\'s text, its creation timestamp, and a score reflecting its community reception. Comments are linked to the specific [posts](/tables/posts_questions.md) (questions or answers) they belong to via `post_id` and to the [users](/tables/users.md) who authored them via `user_id`. This table is crucial for analyzing user engagement, content quality feedback, and conversational threads on the platform.\n\n# Schema\n- `id` (INTEGER) - Unique identifier for the comment.\n- `post_id` (INTEGER) - The ID of the post (question or answer) to which the comment belongs.\n- `score` (INTEGER) - The score of the comment, reflecting upvotes and downvotes.\n- `text` (STRING) - The content of the comment (Comment body).\n- `creation_date` (TIMESTAMP) - The date and time the comment was posted.\n- `user_display_name` (STRING) - The display name of the user who made the comment. Nullable.\n- `user_id` (INTEGER) - The ID of the user who made the comment. Optional, absent if user has been deleted.\n- `content_license` (STRING) - Indicates the Creative Commons license under which the content is licensed.\n\n# Common query patterns\n```sql\n-- Retrieve the 10 most recent comments\nSELECT\n  id,\n  text,\n  creation_date,\n  user_display_name\nFROM\n  `bigquery-public-data.stackoverflow.comments`\nORDER BY\n  creation_date DESC\nLIMIT 10;\n```\n\n```sql\n-- Count comments per user\nSELECT\n  user_display_name,\n  COUNT(id) AS total_comments\nFROM\n  `bigquery-public-data.stackoverflow.comments`\nWHERE\n  user_display_name IS NOT NULL\nGROUP BY\n  user_display_name\nORDER BY\n  total_comments DESC\nLIMIT 10;\n```\n\n```sql\n-- Find comments with a high score for a specific post\nSELECT\n  id,\n  text,\n  score,\n  creation_date\nFROM\n  `bigquery-public-data.stackoverflow.comments`\nWHERE\n  post_id = 45651 AND score > 5\nORDER BY\n  score DESC;\n```\n\n# Citations\n[1] [BigQuery Public Dataset: Stack Overflow Comments](https://bigquery.googleapis.com/v2/projects/bigquery-public-data/datasets/stackoverflow/tables/comments)\n[2] [Database schema documentation for the public data dump and SEDE](https://meta.stackexchange.com/questions/2677/database-schema-documentation-for-the-public-data-dump-and-sede)", "tables/post_history": "This table, part of the [Stack Overflow dataset](/datasets/stackoverflow.md), records every historical event related to posts, such as edits, rollbacks, and changes in post type. Each row represents a single historical event for a particular post, identified by `post_id`, with the event\\'s timestamp recorded in `creation_date`. This allows for a comprehensive audit trail of how content on Stack Overflow evolves over time.\n\n### Schema\n\n- `id` (INTEGER) - Unique identifier for the post history entry.\n- `post_history_type_id` (INTEGER) - An integer representing the type of history event. See the [Post History Type IDs reference](/references/post_history_type_ids.md) for possible values.\n- `post_id` (INTEGER) - The ID of the post to which this history event belongs. Links to `posts_questions` or `posts_answers` tables.\n- `revision_guid` (STRING) - A GUID that groups multiple history records caused by a single action.\n- `creation_date` (TIMESTAMP) - The timestamp when the history event occurred (e.g., `2009-03-05T22:28:34.823`).\n- `user_id` (INTEGER) - The ID of the user who performed the action, if applicable. Links to the `users` table.\n- `user_display_name` (STRING) - Populated if a user has been removed and is no longer referenced by `user_id`; also happens to the author of a migrated post. Nullable.\n- `comment` (STRING) - A brief comment describing the history event. This field can also contain specific IDs based on `PostHistoryTypeId`:\n    - If `PostHistoryTypeId = 10`, it contains the `CloseReasonId`. See the [Close Reason Types reference](/references/close_reason_types.md).\n    - If `PostHistoryTypeId` is `33` or `34`, it contains the `PostNoticeId`.\n- `text` (STRING) - A raw version of the new value for a given revision. This field can also contain specific JSON encoded strings based on `PostHistoryTypeId`:\n    - If `PostHistoryTypeId` is `10, 11, 12, 13, 14, 15, 19, 20, 35`, it contains a JSON encoded string with all users who have voted for that `PostHistoryTypeId`.\n    - If it is a duplicate close vote, the JSON string contains an array of original questions as `OriginalQuestionIds`.\n    - If `PostHistoryTypeId = 17`, it contains migration details (`from <url>` or `to <url>`).\n- `content_license` (STRING) - Indicates the Creative Commons license under which the content is licensed.\n\n### Common query patterns\n\n```sql\nSELECT\n  creation_date,\n  post_history_type_id,\n  user_id,\n  comment,\n  text\nFROM\n  `bigquery-public-data.stackoverflow.post_history`\nWHERE\n  post_id = 456789 -- Example post ID\nORDER BY\n  creation_date DESC\nLIMIT 10;\n```\n\n```sql\nSELECT\n  post_history_type_id,\n  COUNT(*) AS event_count\nFROM\n  `bigquery-public-data.stackoverflow.post_history`\nGROUP BY\n  post_history_type_id\nORDER BY\n  event_count DESC;\n```\n\n```sql\nSELECT\n  t2.display_name,\n  COUNT(t1.id) AS edit_count\nFROM\n  `bigquery-public-data.stackoverflow.post_history` AS t1\nINNER JOIN\n  `bigquery-public-data.stackoverflow.users` AS t2\nON\n  t1.user_id = t2.id\nWHERE\n  t1.post_history_type_id = 2 -- Assuming \\'2\\' means \\'Post Edited\\'\nGROUP BY\n  t2.display_name\nORDER BY\n  edit_count DESC\nLIMIT 5;\n```\n\n### Citations\n\n[1] [BigQuery Public Dataset: Stack Overflow Post History](https://bigquery.googleapis.com/v2/projects/bigquery-public-data/datasets/stackoverflow/tables/post_history)\n[2] [Database schema documentation for the public data dump and SEDE](https://meta.stackexchange.com/questions/2677/database-schema-documentation-for-the-public-data-dump-and-sede)", "tables/post_links": "The `post_links` table in the [stackoverflow](/datasets/stackoverflow.md) dataset records relationships between posts on the Stack Overflow platform. Each row represents a single link between two posts, identifying the `post_id` and `related_post_id`. This table can be used to understand how discussions evolve, identify duplicate questions, or find related content across the platform. The `link_type_id` categorizes the nature of the relationship, such as \"Linked\" or \"Duplicate\".\n\n# Schema\n\n*   `id` (INTEGER) - Unique identifier for the post link (primary key).\n*   `creation_date` (TIMESTAMP) - The timestamp when the link was created.\n*   `link_type_id` (INTEGER) - The type of link. See the [Link Types reference](/references/link_types.md) for possible values.\n*   `post_id` (INTEGER) - The ID of the source post. Links to the `id` in the `posts_questions` or `posts_answers` tables.\n*   `related_post_id` (INTEGER) - The ID of the target/related post. Links to the `id` in the `posts_questions` or `posts_answers` tables.\n\n# Common query patterns\n\n```sql\nSELECT\n  pl.post_id,\n  pl.related_post_id,\n  pl.creation_date,\n  pl.link_type_id\nFROM\n  `bigquery-public-data.stackoverflow.post_links` AS pl\nWHERE\n  pl.post_id = 12345\nLIMIT 100;\n```\n\n```sql\nSELECT\n  link_type_id,\n  COUNT(*) AS link_count\nFROM\n  `bigquery-public-data.stackoverflow.post_links`\nGROUP BY\n  link_type_id\nORDER BY\n  link_count DESC;\n```\n\n# Citations\n\n[1] [BigQuery Public Dataset: Stack Overflow Post Links](https://bigquery.googleapis.com/v2/projects/bigquery-public-data/datasets/stackoverflow/tables/post_links)\n[2] [Database schema documentation for the public data dump and SEDE](https://meta.stackexchange.com/questions/2677/database-schema-documentation-for-the-public-data-dump-and-sede)", "tables/posts_answers": "The `posts_answers` table in the [stackoverflow](/datasets/stackoverflow.md) dataset contains all posts identified as answers to questions on the Stack Overflow platform. Each row in this table represents a single answer, providing details such as the answer\\'s body, its score, creation date, and the ID of the parent question it answers. This table can be joined with other tables like [posts_questions](/tables/posts_questions.md) on `parent_id` to link answers to their respective questions. It\\'s a valuable resource for analyzing answer quality, user contributions, and engagement patterns within the Stack Overflow community.\n\n# Schema\n- `id` (INTEGER) - Unique identifier for the answer.\n- `title` (STRING) - The title of the post. This is typically NULL for answers.\n- `body` (STRING) - The body of the post, as rendered HTML, not Markdown.\n- `accepted_answer_id` (INTEGER) - The ID of the answer that was accepted for a question. This field is only applicable to questions, so it is typically NULL for answers.\n- `answer_count` (INTEGER) - The number of answers. This field is only applicable to questions, so it is typically NULL for answers.\n- `closed_date` (TIMESTAMP) - The date and time the post was closed; present only if the post is closed. This is typically NULL for answers.\n- `comment_count` (INTEGER) - The number of comments.\n- `community_owned_date` (TIMESTAMP) - The date and time the post became community wiki\\'d.\n- `creation_date` (TIMESTAMP) - The date and time the answer was created.\n- `favorite_count` (INTEGER) - The number of times the post has been favorited. Nullable. This is typically NULL for answers.\n- `last_activity_date` (TIMESTAMP) - The datetime of the post\\'s most recent activity.\n- `last_edit_date` (TIMESTAMP) - The date and time of the most recent edit to the answer.\n- `last_editor_display_name` (STRING) - The display name of the last editor. Nullable.\n- `last_editor_user_id` (INTEGER) - The ID of the last editor user. Nullable.\n- `owner_display_name` (STRING) - The display name of the answer\\'s owner. Nullable.\n- `owner_user_id` (INTEGER) - The ID of the answer\\'s owner. Present only if user has not been deleted.\n- `parent_id` (INTEGER) - The ID of the question this answer belongs to. Present only if `PostTypeId = 2`.\n- `post_type_id` (INTEGER) - The type of post. For answers, this is `2`. See the [Post Type IDs reference](/references/post_type_ids.md) for possible values.\n- `score` (INTEGER) - The score of the answer; generally non-zero for Questions, Answers, and Moderator Nominations.\n- `tags` (STRING) - Tags associated with the post. This is typically NULL for answers, as tags are associated with the parent question.\n- `view_count` (INTEGER) - The number of times the post was viewed. This field is only applicable to questions, so it is typically NULL for answers.\n- `content_license` (STRING) - Indicates the Creative Commons license under which the content is licensed.\n\n# Common query patterns\n1. Get the 10 most highly-scored answers in a specific date range:\n```sql\nSELECT\n  id,\n  score,\n  creation_date,\n  body\nFROM\n  `bigquery-public-data.stackoverflow.posts_answers`\nWHERE\n  creation_date BETWEEN \\'2023-01-01\\' AND \\'2023-01-31\\'\nORDER BY\n  score DESC\nLIMIT 10\n```\n2. Find the total number of answers by a specific user:\n```sql\nSELECT\n  owner_user_id,\n  COUNT(id) AS total_answers\nFROM\n  `bigquery-public-data.stackoverflow.posts_answers`\nWHERE\n  owner_user_id = 12345 -- Replace with a valid user ID\nGROUP BY\n  owner_user_id\n```\n3. Join answers with their corresponding questions:\n```sql\nSELECT\n  q.title AS question_title,\n  a.body AS answer_body,\n  a.score AS answer_score\nFROM\n  `bigquery-public-data.stackoverflow.posts_answers` AS a\nJOIN\n  `bigquery-public-data.stackoverflow.posts_questions` AS q\nON\n  a.parent_id = q.id\nWHERE\n  q.id = 5000 -- Example question ID\n```\n\n# Citations\n[1] [Stack Overflow Posts Answers Table](https://bigquery.googleapis.com/v2/projects/bigquery-public-data/datasets/stackoverflow/tables/posts_answers)\n[2] [Stack Overflow Public Data Explorer](https://data.stackexchange.com/)\n[3] [Database schema documentation for the public data dump and SEDE](https://meta.stackexchange.com/questions/2677/database-schema-documentation-for-the-public-data-dump-and-sede)", "tables/posts_moderator_nomination": "This table contains posts submitted by users nominating themselves or others to become moderators on the Stack Overflow platform. Each row represents a single moderator nomination post, detailing the candidate's qualifications or reasons for nomination.\n\nThe `creation_date` field indicates when the nomination post was created, providing a historical record of moderator elections and community engagement.\n\n# Schema\n\n- `id`: Unique identifier for the post.\n- `title`: Title of the nomination post (often null for this post type).\n- `body`: The content of the nomination post, describing the candidate's qualifications.\n- `accepted_answer_id`: (STRING) ID of the accepted answer, if applicable.\n- `answer_count`: (STRING) Number of answers to the post.\n- `comment_count`: Number of comments on the post.\n- `community_owned_date`: Timestamp when the post became community-owned.\n- `creation_date`: Timestamp when the post was created.\n- `favorite_count`: (STRING) Number of times the post has been favorited.\n- `last_activity_date`: Timestamp of the last activity on the post.\n- `last_edit_date`: Timestamp of the last edit to the post.\n- `last_editor_display_name`: Display name of the last editor.\n- `last_editor_user_id`: User ID of the last editor.\n- `owner_display_name`: Display name of the post owner.\n- `owner_user_id`: User ID of the post owner. This links to the [/users](/tables/users.md) table.\n- `parent_id`: (STRING) ID of the parent post, if this is a reply.\n- `post_type_id`: Type of the post (e.g., 6 for moderator nomination).\n- `score`: The score of the post.\n- `tags`: (STRING) Tags associated with the post.\n- `view_count`: (STRING) Number of views the post has received.\n\n# Common query patterns\n\n```sql\nSELECT\n    id,\n    creation_date,\n    owner_user_id,\n    body\n  FROM\n    `bigquery-public-data.stackoverflow.posts_moderator_nomination`\n  WHERE\n    creation_date BETWEEN '2021-01-01' AND '2021-12-31'\n  ORDER BY\n    creation_date DESC\n  LIMIT 100\n```\n\n```sql\nSELECT\n    p.id,\n    p.creation_date,\n    u.display_name AS nominator_name,\n    p.body\n  FROM\n    `bigquery-public-data.stackoverflow.posts_moderator_nomination` AS p\n  JOIN\n    `bigquery-public-data.stackoverflow.users` AS u\n    ON p.owner_user_id = u.id\n  WHERE\n    p.creation_date >= '2022-01-01'\n  LIMIT 10\n```\n\n# Citations\n\n[1] [BigQuery Public Data: Stack Overflow Posts Moderator Nomination](https://bigquery.googleapis.com/v2/projects/bigquery-public-data/datasets/stackoverflow/tables/posts_moderator_nomination)", "tables/posts_orphaned_tag_wiki": "This table, part of the public [Stack Overflow dataset](/datasets/stackoverflow.md), contains posts that were originally created as Tag Wikis but are no longer linked to an existing tag within the Stack Overflow platform. These 'orphaned' Tag Wiki entries typically describe the purpose and usage of a specific programming language, technology, or concept. Each row represents a single Tag Wiki post, identified by a unique `id`. The `post_type_id` for these entries is typically `3`. The table includes the body of the wiki, creation dates, and metadata about the last editor and activity. It can be used to analyze historical Tag Wiki content that has become disassociated from its original tag.\n\n# Schema\n\n- `id`: Unique identifier for the post.\n- `title`: Title of the post (often null for Tag Wikis).\n- `body`: The main content of the Tag Wiki, often including HTML.\n- `accepted_answer_id`: (Always null for this post type).\n- `answer_count`: (Always null for this post type).\n- `comment_count`: Number of comments on the post.\n- `community_owned_date`: Timestamp when the post became community-owned.\n- `creation_date`: Timestamp when the post was created.\n- `favorite_count`: Number of times the post has been favorited.\n- `last_activity_date`: Timestamp of the last activity on the post.\n- `last_edit_date`: Timestamp of the last edit to the post.\n- `last_editor_display_name`: Display name of the last user to edit the post.\n- `last_editor_user_id`: User ID of the last user to edit the post.\n- `owner_display_name`: Display name of the user who owns the post.\n- `owner_user_id`: User ID of the user who owns the post.\n- `parent_id`: (Always null for this post type).\n- `post_type_id`: Type of the post. For this table, it's typically `3` (Tag Wiki).\n- `score`: The score of the post.\n- `tags`: Tags associated with the post (often null as these are orphaned).\n- `view_count`: Number of times the post has been viewed.\n\n# Common query patterns\n\n```sql\nSELECT\n    id,\n    creation_date,\n    body\n  FROM\n    `bigquery-public-data.stackoverflow.posts_orphaned_tag_wiki`\n  WHERE\n    creation_date < '2015-01-01'\n  LIMIT 100;\n```\n\n```sql\nSELECT\n    id,\n    body\n  FROM\n    `bigquery-public-data.stackoverflow.posts_orphaned_tag_wiki`\n  WHERE\n    id = 4164933;\n```\n\n```sql\nSELECT\n    count(id) AS total_orphaned_tag_wikis\n  FROM\n    `bigquery-public-data.stackoverflow.posts_orphaned_tag_wiki`;\n```\n\n# Citations\n\n[1] [BigQuery Public Data: Stack Overflow posts_orphaned_tag_wiki](https://bigquery.googleapis.com/v2/projects/bigquery-public-data/datasets/stackoverflow/tables/posts_orphaned_tag_wiki)\n[2] [Stack Overflow](https://stackoverflow.com/)", "tables/posts_privilege_wiki": "This BigQuery table, `posts_privilege_wiki`, contains posts that describe various user privileges within the Stack Overflow community. These entries serve as informational guides, explaining what a privilege entails, when and how to use it, and related community guidelines. Examples include details on editing questions and answers, or the process of retagging questions. Each row represents a specific privilege explanation, detailing its purpose and usage, contributing to the self-documentation of the platform's community features.\n\n# Schema\n- `id`: Unique identifier for the post.\n- `title`: The title of the post. For these privilege wiki entries, titles are often null, with the main content in the body.\n- `body`: The full content of the privilege explanation, often including HTML formatting.\n- `accepted_answer_id`: (Always null for these types of posts)\n- `answer_count`: (Always null for these types of posts)\n- `comment_count`: Number of comments on the post.\n- `community_owned_date`: Date when the post became community-owned.\n- `creation_date`: Timestamp when the post was created.\n- `favorite_count`: (Always null for these types of posts)\n- `last_activity_date`: Timestamp of the last activity on the post.\n- `last_edit_date`: Timestamp of the last edit to the post.\n- `last_editor_display_name`: Display name of the last user who edited the post.\n- `last_editor_user_id`: User ID of the last user who edited the post.\n- `owner_display_name`: Display name of the post's owner.\n- `owner_user_id`: User ID of the post's owner. Often -1 for community posts.\n- `parent_id`: (Always null for these types of posts)\n- `post_type_id`: Type of post, typically 8 for wiki entries.\n- `score`: The score (upvotes minus downvotes) of the post.\n- `tags`: (Always null for these types of posts)\n- `view_count`: (Always null for these types of posts)\n\n# Common query patterns\n```sql\nSELECT\n  id,\n  body\nFROM\n  `bigquery-public-data.stackoverflow.posts_privilege_wiki`\nWHERE\n  creation_date >= '2013-01-01'\nLIMIT 100\n```\n```sql\nSELECT\n  id,\n  body,\n  creation_date\nFROM\n  `bigquery-public-data.stackoverflow.posts_privilege_wiki`\nWHERE\n  body LIKE '%edit questions and answers%'\n```\n\n# Citations\n[1] [BigQuery Public Dataset: Stack Overflow Posts Privilege Wiki](https://bigquery.googleapis.com/v2/projects/bigquery-public-data/datasets/stackoverflow/tables/posts_privilege_wiki)", "tables/posts_questions": "This table, part of the public [Stack Overflow dataset](/datasets/stackoverflow.md), contains comprehensive data for every question asked on the Stack Overflow platform. Each row represents a unique question post, including its content, metadata such as creation and last activity dates, view counts, and score. It serves as a primary resource for analyzing user activity, popular topics, and the overall dynamics of the Q&A community. The table can be joined with other tables like [posts_answers](/tables/posts_answers.md) to link questions to their corresponding answers, or with [users](/tables/users.md) to retrieve information about the question\\'s author.\n\n# Schema\nThe schema contains fields related to the question\\'s content, status, and associated user data. Key fields include `id` for unique identification, `title` and `body` for the question\\'s content, `creation_date` for when the question was posted, and `tags` for categorizing the question.\n\n- `id` (INTEGER) - Unique identifier for the post.\n- `title` (STRING) - The title of the question (for `PostTypeId = 1`).\n- `body` (STRING) - The body of the post, as rendered HTML, not Markdown.\n- `accepted_answer_id` (INTEGER) - The ID of the accepted answer; present only if `PostTypeId = 1`.\n- `answer_count` (INTEGER) - The number of undeleted answers; present only if `PostTypeId = 1`.\n- `closed_date` (TIMESTAMP) - The date and time the post was closed; present only if the post is closed.\n- `comment_count` (INTEGER) - The number of comments.\n- `community_owned_date` (TIMESTAMP) - The date and time the post became community wiki\\'d.\n- `creation_date` (TIMESTAMP) - The date and time the post was created.\n- `favorite_count` (INTEGER) - The number of times the post has been favorited. Nullable.\n- `last_activity_date` (TIMESTAMP) - The datetime of the post\\'s most recent activity.\n- `last_edit_date` (TIMESTAMP) - The date and time of the most recent edit to the post.\n- `last_editor_display_name` (STRING) - The display name of the last editor. Nullable.\n- `last_editor_user_id` (INTEGER) - The ID of the last editor user. Nullable.\n- `owner_display_name` (STRING) - The display name of the post owner. Nullable.\n- `owner_user_id` (INTEGER) - The ID of the post owner. Present only if user has not been deleted; always -1 for tag wiki entries.\n- `parent_id` (STRING) - Parent ID. For questions (`PostTypeId = 1`), this field is typically NULL. It is mainly used for answers (`PostTypeId = 2`) to link to their parent question.\n- `post_type_id` (INTEGER) - The type of the post. For questions, this is `1`. See the [Post Type IDs reference](/references/post_type_ids.md) for possible values.\n- `score` (INTEGER) - The score of the post; generally non-zero for Questions, Answers, and Moderator Nominations.\n- `tags` (STRING) - The tags associated with the question (for `PostTypeId = 1`).\n- `view_count` (INTEGER) - The number of times the post has been viewed. Nullable.\n- `content_license` (STRING) - Indicates the Creative Commons license under which the content is licensed.\n\n# Common query patterns\n1. **Find the most viewed questions in a specific tag:**\n   ```sql\n   SELECT\n     title,\n     view_count\n   FROM\n     `bigquery-public-data.stackoverflow.posts_questions`\n   WHERE\n     tags LIKE \\'%<your-tag>%'\n   ORDER BY\n     view_count DESC\n   LIMIT 10\n   ```\n2. **Count questions posted per year:**\n   ```sql\n   SELECT\n     EXTRACT(YEAR FROM creation_date) AS year,\n     COUNT(id) AS question_count\n   FROM\n     `bigquery-public-data.stackoverflow.posts_questions`\n   GROUP BY\n     year\n   ORDER BY\n     year DESC\n   ```\n3. **Get questions with accepted answers and their answer count:**\n   ```sql\n   SELECT\n     id,\n     title,\n     accepted_answer_id,\n     answer_count\n   FROM\n     `bigquery-public-data.stackoverflow.posts_questions`\n   WHERE\n     accepted_answer_id IS NOT NULL\n   ORDER BY\n     answer_count DESC\n   LIMIT 5\n   ```\n\n# Citations\n[1] [posts_questions](https://bigquery.googleapis.com/v2/projects/bigquery-public-data/datasets/stackoverflow/tables/posts_questions)\n[2] [Database schema documentation for the public data dump and SEDE](https://meta.stackexchange.com/questions/2677/database-schema-documentation-for-the-public-data-dump-and-sede)", "tables/posts_tag_wiki": "The `posts_tag_wiki` table in the BigQuery Stack Overflow dataset stores detailed wiki descriptions for various [tags](/tables/tags.md) used on the platform. Each row represents a wiki entry associated with a specific tag, providing comprehensive information about its purpose, usage, and related concepts. This table is useful for understanding the context and definition of tags, which helps in categorizing questions and answers accurately. The `body` field contains the rich text content of the wiki. This table is a valuable resource for anyone analyzing the structure and content organization of [Stack Overflow](/datasets/stackoverflow.md). The grain of this table is one row per tag wiki entry.\n\n# Schema\n- `id`: INTEGER, Unique identifier for the tag wiki post.\n- `title`: STRING, Title of the tag wiki (often null for actual tag wiki posts).\n- `body`: STRING, The main content of the tag wiki, containing detailed description.\n- `accepted_answer_id`: STRING, ID of the accepted answer, if applicable.\n- `answer_count`: STRING, Number of answers.\n- `comment_count`: INTEGER, Number of comments on the post.\n- `community_owned_date`: TIMESTAMP, Date when the post became community-owned.\n- `creation_date`: TIMESTAMP, Date and time the post was created.\n- `favorite_count`: STRING, Number of times the post has been favorited.\n- `last_activity_date`: TIMESTAMP, Date and time of the last activity on the post.\n- `last_edit_date`: TIMESTAMP, Date and time of the last edit to the post.\n- `last_editor_display_name`: STRING, Display name of the last editor.\n- `last_editor_user_id`: INTEGER, User ID of the last editor.\n- `owner_display_name`: STRING, Display name of the post owner.\n- `owner_user_id`: INTEGER, User ID of the post owner.\n- `parent_id`: STRING, ID of the parent post, if applicable.\n- `post_type_id`: INTEGER, Identifier for the type of post (e.g., 5 for Tag Wiki).\n- `score`: INTEGER, The score of the post.\n- `tags`: STRING, Tags associated with the post (usually null for tag wiki posts, as the wiki *is* for a tag).\n- `view_count`: STRING, Number of views the post has received.\n\n# Common query patterns\n\nTo retrieve the body of a specific tag wiki:\n```sql\nSELECT\n    body\n  FROM\n    `bigquery-public-data.stackoverflow.posts_tag_wiki`\n  WHERE\n    id = 5046395\n```\n\nTo find tag wiki entries created after a certain date:\n```sql\nSELECT\n    id,\n    creation_date,\n    body\n  FROM\n    `bigquery-public-data.stackoverflow.posts_tag_wiki`\n  WHERE\n    creation_date > '2020-01-01'\n  LIMIT 100\n```\n\nTo count the number of tag wiki entries per creation year:\n```sql\nSELECT\n    EXTRACT(YEAR FROM creation_date) AS creation_year,\n    COUNT(id) AS number_of_wikis\n  FROM\n    `bigquery-public-data.stackoverflow.posts_tag_wiki`\n  GROUP BY\n    creation_year\n  ORDER BY\n    creation_year DESC\n```\n\n# Citations\n[1] [BigQuery Public Dataset: Stack Overflow Posts Tag Wiki](https://bigquery.googleapis.com/v2/projects/bigquery-public-data/datasets/stackoverflow/tables/posts_tag_wiki)", "tables/posts_tag_wiki_excerpt":
